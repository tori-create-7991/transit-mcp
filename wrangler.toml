name = "transit-mcp"
main = "src/index.ts"
compatibility_date = "2025-09-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
TRANSIT_API_BASE = "https://api.transit.ls8h.com"
MAP_STYLE_URL = "https://tiles.openfreemap.org/styles/positron"
MAP_STYLE_URL_DARK = "https://tiles.openfreemap.org/styles/dark-matter"
DEFAULT_LANG = "ja"

[[kv_namespaces]]
binding = "UI_CACHE"
id = "39b40d82ce464c879534ec2c13b1d589"

[[routes]]
pattern = "transit-mcp.tori-dev.com"
custom_domain = true
